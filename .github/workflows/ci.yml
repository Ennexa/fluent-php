---

name: Build and Lint
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.yaml'
      - '**.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXTENSION_NAME: fluent

jobs:
  lint:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        clang: [ "16" ]
        target: [ "x86_64-unknown-linux-gnu" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache LLVM and Clang
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llvm-${{ matrix.clang }}
          key: llvm-${{ matrix.clang }}-${{ runner.os }}

      - name: Setup LLVM & Clang
        id: clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ matrix.clang }}
          directory: ${{ runner.temp }}/llvm-${{ matrix.clang }}
          cached: ${{ steps.cache-llvm.outputs.cache-hit }}

      - name: Configure Clang
        run: |
          echo "LIBCLANG_PATH=${{ runner.temp }}/llvm-${{ matrix.clang }}/lib" >> $GITHUB_ENV
          echo "LLVM_VERSION=${{ steps.clang.outputs.version }}" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=${{ runner.temp }}/llvm-${{ matrix.clang }}/bin/llvm-config" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: lint-${{ matrix.target }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} --all-targets -- -D warnings

  tests:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        php-version: [ "8.5" ]
        clang: [ "16" ]
        target: [ "x86_64-unknown-linux-gnu" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache LLVM and Clang
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llvm-${{ matrix.clang }}
          key: llvm-${{ matrix.clang }}-${{ runner.os }}

      - name: Setup LLVM & Clang
        id: clang
        if: runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ matrix.clang }}
          directory: ${{ runner.temp }}/llvm-${{ matrix.clang }}
          cached: ${{ steps.cache-llvm.outputs.cache-hit }}

      - name: Configure Clang
        run: |
          echo "LIBCLANG_PATH=${{ runner.temp }}/llvm-${{ matrix.clang }}/lib" >> $GITHUB_ENV
          echo "LLVM_VERSION=${{ steps.clang.outputs.version }}" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=${{ runner.temp }}/llvm-${{ matrix.clang }}/bin/llvm-config" >> $GITHUB_ENV

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: php-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.php-version }}

      - name: Build module
        run: |
          cargo build --target ${{ matrix.target }} --lib
          cargo test --target ${{ matrix.target }}

  build:
    runs-on: ${{ matrix.os }}
    needs:
      - tests
      - lint
    strategy:
      matrix:
        clang: [ "16" ]
        php-version: [ "8.2", "8.3", "8.4", "8.5" ]
        target: [ x86_64-pc-windows-msvc, aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu ]
        phpts: [ "nts", "ts" ]
        include:
          - { rust_channel: stable }
          - { target: x86_64-pc-windows-msvc, rust_channel: nightly }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04 }
        exclude:
          - { target: aarch64-apple-darwin, phpts: ts }
          - { target: x86_64-apple-darwin, phpts: ts }
          - { target: x86_64-unknown-linux-gnu, phpts: ts }
          - { target: aarch64-unknown-linux-gnu, phpts: ts }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache LLVM and Clang
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/llvm-${{ matrix.clang }}
          key: llvm-${{ matrix.clang }}-${{ runner.os }}

      - name: Setup LLVM & Clang
        id: clang
        if: runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ matrix.clang }}
          directory: ${{ runner.temp }}/llvm-${{ matrix.clang }}
          cached: ${{ steps.cache-llvm.outputs.cache-hit }}

      - name: Configure Clang
        if: runner.os == 'Linux'
        run: |
          echo "LIBCLANG_PATH=${{ runner.temp }}/llvm-${{ matrix.clang }}/lib" >> $GITHUB_ENV
          echo "LLVM_VERSION=${{ steps.clang.outputs.version }}" >> $GITHUB_ENV
          echo "LLVM_CONFIG_PATH=${{ runner.temp }}/llvm-${{ matrix.clang }}/bin/llvm-config" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          targets: ${{ matrix.target }}
          toolchain: ${{ matrix.rust_channel }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.php-version }}

      - name: Force rebuild of PHP-linked crate to prevent ts/nts conflict
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo clean -p ext-php-rs
          rm -rf target/*/build/ext-php-rs-* 2>/dev/null || true

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: php-config
        env:
          phpts: ${{ matrix.phpts }}

      - name: OS Specific Configuration - Linux
        if: runner.os == 'Linux'
        run: |
          echo "OUTPUT_FILE=lib${{ env.EXTENSION_NAME }}.so" >> $GITHUB_ENV
          echo "LIB_EXT=so" >> $GITHUB_ENV
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross musl-tools musl-dev

      - name: OS Specific Configuration - macOS
        if: runner.os == 'macOS'
        run: |
          echo "OUTPUT_FILE=lib${{ env.EXTENSION_NAME }}.dylib" >> $GITHUB_ENV
          echo "LIB_EXT=so" >> $GITHUB_ENV

      - name: OS Specific Configuration - Windows
        if: runner.os == 'Windows'
        run: |
          echo "OUTPUT_FILE=${{ env.EXTENSION_NAME }}.dll" >> $GITHUB_ENV
          echo "LIB_EXT=dll" >> $GITHUB_ENV
        shell: bash

      - name: Build module
        run: |
          cargo build --release --target ${{ matrix.target }} --lib

      - name: Rename file
        run: mv target/${{ matrix.target }}/release/${{ env.OUTPUT_FILE }} target/php${{ matrix.php-version }}-${{ matrix.phpts }}-${{ matrix.target }}-${{ env.EXTENSION_NAME }}.${{ env.LIB_EXT }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: php${{ matrix.php-version }}-${{ matrix.phpts }}-${{ matrix.target }}
          path: target/php${{ matrix.php-version }}-${{ matrix.phpts }}-${{ matrix.target }}-${{ env.EXTENSION_NAME }}.${{ env.LIB_EXT }}

  integration:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        php-version: [ "8.2", "8.3", "8.4", "8.5" ]
        target: [ x86_64-pc-windows-msvc, aarch64-apple-darwin, x86_64-apple-darwin, x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu ]
        phpts: [ "nts", "ts" ]
        include:
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-15-intel }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
        exclude:
          - { target: aarch64-apple-darwin, phpts: ts }
          - { target: x86_64-apple-darwin, phpts: ts }
          - { target: x86_64-unknown-linux-gnu, phpts: ts }
          - { target: aarch64-unknown-linux-gnu, phpts: ts }
          - { target: aarch64-unknown-linux-gnu }   # build-only: no native arm64 Linux runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
        env:
          phpts: ${{ matrix.phpts }}

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: php${{ matrix.php-version }}-${{ matrix.phpts }}-${{ matrix.target }}
          path: ./dist

      - name: Run PHP Test
        shell: bash
        run: |
          set -x
          EXT=$(find ./dist -maxdepth 1 -type f \( -name '*.so' -o -name '*.dll' \) | head -n1)
          if [ -z "$EXT" ]; then
            echo "::error::No built extension found in ./dist"
            exit 1
          fi
          php -d extension="$EXT" -m
          NO_INTERACTION=1 php run-tests.php -n -d extension="$EXT"

  release:
    runs-on: ubuntu-22.04
    needs: integration
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Cargo Version
        id: cargo_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: ./artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
